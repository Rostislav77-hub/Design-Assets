<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmed Love</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .heart-container {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .love-word {
            position: absolute;
            color: #f8b3c9;
            font-size: 1.2rem;
            text-shadow: 0 0 8px #f8b3c9; 
            white-space: nowrap;
            transform: translate(-50%, -50%);
            animation: heart-anim 2.5s infinite ease-in-out;
        }

        @keyframes heart-anim {
            0% { 
                opacity: 0.7; 
                transform: translate(-50%, -50%) scale(1) translateZ(0); 
            }
            50% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.05) translateZ(30px); 
                text-shadow: 0 0 15px #f8b3c9, 0 0 25px #f8b3c9; 
            }
            100% { 
                opacity: 0.7; 
                transform: translate(-50%, -50%) scale(1) translateZ(0); 
            }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart-container"></div>

    <script>
        const container = document.getElementById('heart-container');
        const word = 'i love you';
        const totalElements = 75; 

        for (let i = 0; i < totalElements; i++) {
            const t = (i / totalElements) * Math.PI * 2;
            
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)); 

            const scale = 14; 
            const left = x * scale;
            const top = y * scale;

            const el = document.createElement('div');
            el.className = 'love-word';
            el.innerText = word;
            el.style.left = `calc(50% + ${left}px)`;
            el.style.top = `calc(50% + ${top}px)`;
            el.style.animationDelay = `${Math.random() * 2}s`;

            container.appendChild(el);
        }
    </script>
</body>
</html>
